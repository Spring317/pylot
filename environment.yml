name: pylot
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.7
  - cmake
  - make
  - gcc_linux-64
  - gxx_linux-64
  - sysroot_linux-64>=2.17
  - libpng
  - geos
  - llvmdev
  - eigen
  - qt
  - mesa-libgl-devel-cos7-x86_64  # GL/gl.h for Qt5Gui
  - git
  - wget
  - unzip
  - tk
  - pip
  # Install cvxpy from conda-forge (pre-built) to avoid the
  # compiler_compat/ld linker error when pip tries to build
  # qdldl/cvxcore from source inside an isolated build env.
  - cvxpy
  - pip:
    - -r requirements.txt
