###############################################################################
# Module: Simulator / sensors (CARLA)
# World + sensor settings shared by every other module.
###############################################################################
--simulator_host=localhost
--simulator_port=2000
--simulator_num_people=30
--simulator_num_vehicles=15
--simulator_spawn_point_index=1
--camera_image_width=800
--camera_image_height=600
# Locate detected obstacles in 3D from a (perfect) depth camera so the
# perception -> prediction -> planning chain has world coordinates to work with.
--obstacle_location_finder_sensor=depth_camera
--perfect_depth_estimation
###############################################################################
# Logging
###############################################################################
--log_file_name=pylot.log
--csv_log_file_name=pylot.csv
--v=1
