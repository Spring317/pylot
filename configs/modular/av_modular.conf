###############################################################################
# Modular autonomous-driving pipeline (master flagfile)
#
# Composes the full self-driving stack from one flagfile per module, in
# dependency order:
#
#   Perception        Prediction      Planning        Control
#   detect -> track ->  predict   ->  trajectory  ->  actuate
#   (YOLO)   (SORT)     (linear)      (Frenet)        (PID)
#
# Each line below pulls in one self-contained, swappable module. To change a
# stage, edit that module file (or point the line at a different one) -- nothing
# else needs to change. Run from $PYLOT_HOME so the relative paths resolve:
#
#   python3 pylot.py --flagfile=configs/modular/av_modular.conf
###############################################################################
--flagfile=configs/modular/10_simulator.conf
--flagfile=configs/modular/20_perception_detection.conf
--flagfile=configs/modular/30_perception_tracking.conf
--flagfile=configs/modular/40_prediction.conf
--flagfile=configs/modular/50_planning.conf
--flagfile=configs/modular/60_control.conf
