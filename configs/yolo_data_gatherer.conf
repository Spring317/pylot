# Minimal data-gatherer config for YOLO obstacle detection training.
--data_path=data/yolo_raw/
# Log every 5th simulation tick (~2 fps at 10 fps sim)
--log_every_nth_message=5
# Only collect what YOLO training needs
--log_rgb_camera
--log_obstacles
--log_traffic_lights
###### Control ######
--control=simulator_auto_pilot
--stop_for_traffic_lights=False
############# CARLA settings #############
--simulator_timeout=60
--simulator_num_people=50
--simulator_num_vehicles=30
--simulator_spawn_point_index=-1
--camera_image_width=1280
--camera_image_height=720
############# Other settings #############
--log_file_name=yolo_data_gatherer.log
--csv_log_file_name=yolo_data_gatherer.csv
--v=0
